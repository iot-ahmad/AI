services:
  - type: web
    name: ai-social-content
    env: docker
    plan: free          # Free tier — 512 MB RAM, spins down after 15 min idle
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: TWITTER_API_KEY
        sync: false
      - key: TWITTER_API_SECRET
        sync: false
      - key: TWITTER_ACCESS_TOKEN
        sync: false
      - key: TWITTER_ACCESS_SECRET
        sync: false
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: YOUTUBE_CLIENT_SECRETS
        sync: false
      - key: NICHE_KEYWORDS
        value: "AI,motivation,business,productivity"
      - key: PIPELINE_INTERVAL_HOURS
        value: "6"
      - key: OUTPUT_DIR
        value: "/tmp/output"
